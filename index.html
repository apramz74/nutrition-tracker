<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>macros · today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deepest: #050b1f;
    --navy-deep: #0a1532;
    --navy: #11214d;
    --navy-mid: #1a2f6b;
    --blue-bright: #4cc9ff;
    --blue-electric: #7ddfff;
    --blue-soft: #b8e8ff;
    --blue-pale: #e6f4ff;
    --cyan-glow: #00e5ff;
    --accent-coral: #ff6b8a;
    --accent-mint: #6affd4;
    --accent-yellow: #ffd166;
    --text: #e8f1ff;
    --text-dim: #8aa3c9;
    --text-faint: #5a7099;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--navy-deepest);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-y: auto;
    padding: 28px 22px 140px;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(76,201,255,0.18), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 30%, rgba(0,229,255,0.12), transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(125,223,255,0.08), transparent 60%),
      linear-gradient(180deg, #050b1f 0%, #0a1532 50%, #050b1f 100%);
  }

  /* grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.4;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
    z-index: 0;
  }

  /* floating orbs background */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    animation: float 14s ease-in-out infinite;
  }
  .orb-1 { width: 280px; height: 280px; background: rgba(76,201,255,0.25); top: -80px; right: -60px; }
  .orb-2 { width: 220px; height: 220px; background: rgba(0,229,255,0.18); bottom: 20%; left: -80px; animation-delay: -5s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -40px) scale(1.1); }
  }

  .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

  /* header */
  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; }
  .greeting { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px; }
  .date { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .date em { font-style: italic; color: var(--blue-bright); font-weight: 400; }
  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--blue-soft);
    background: rgba(76,201,255,0.08);
    border: 1px solid rgba(76,201,255,0.2);
    padding: 8px 12px;
    border-radius: 100px;
    backdrop-filter: blur(10px);
  }

  /* hero — main calorie ring */
  .hero {
    position: relative;
    background: linear-gradient(145deg, rgba(26,47,107,0.5), rgba(10,21,50,0.3));
    border: 1px solid rgba(76,201,255,0.2);
    border-radius: 32px;
    padding: 28px 24px;
    margin-bottom: 16px;
    backdrop-filter: blur(20px);
    overflow: hidden;
    box-shadow:
      0 20px 60px -20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(76,201,255,0.15), transparent 50%);
    pointer-events: none;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .hero-row { display: flex; align-items: center; gap: 20px; position: relative; }
  .ring-wrap { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(76,201,255,0.12); stroke-width: 10; }
  .ring-fill {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dasharray 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 8px rgba(76,201,255,0.6));
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-num {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--blue-pale);
  }
  .ring-unit {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .hero-stats { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .hero-stat {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px dashed rgba(76,201,255,0.15);
    padding-bottom: 8px;
  }
  .hero-stat:last-child { border-bottom: none; padding-bottom: 0; }
  .hero-stat-key { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }
  .hero-stat-val { font-family: 'Fraunces', serif; font-size: 18px; color: var(--blue-soft); }
  .hero-stat-val em { font-style: normal; color: var(--text-faint); font-size: 12px; margin-left: 2px; }

  /* macro cards */
  .macros { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .macro {
    position: relative;
    background: linear-gradient(145deg, rgba(26,47,107,0.4), rgba(10,21,50,0.2));
    border: 1px solid rgba(125,223,255,0.18);
    border-radius: 24px;
    padding: 18px 16px;
    backdrop-filter: blur(20px);
    overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .macro::after {
    content: '';
    position: absolute;
    top: -40%; right: -40%;
    width: 120px; height: 120px;
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.4;
    pointer-events: none;
  }
  .macro.protein::after { background: var(--accent-coral); }
  .macro.fiber::after { background: var(--accent-mint); }
  .macro-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .macro-dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
  .macro.protein .macro-dot { background: var(--accent-coral); color: var(--accent-coral); }
  .macro.fiber .macro-dot { background: var(--accent-mint); color: var(--accent-mint); }
  .macro-num {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .macro-num-unit {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
  }
  .macro-bar {
    margin-top: 12px;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 100px;
    overflow: hidden;
  }
  .macro-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .macro.protein .macro-bar-fill {
    background: linear-gradient(90deg, var(--accent-coral), #ff9eaf);
    box-shadow: 0 0 12px rgba(255,107,138,0.5);
  }
  .macro.fiber .macro-bar-fill {
    background: linear-gradient(90deg, var(--accent-mint), #b3ffe6);
    box-shadow: 0 0 12px rgba(106,255,212,0.5);
  }
  .macro-target {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 6px;
  }

  /* log section */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .section-title em { font-style: italic; color: var(--blue-bright); }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .log { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .entry {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(26,47,107,0.25);
    border: 1px solid rgba(76,201,255,0.12);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    width: 42px;
  }
  .entry-stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .entry-stat { display: flex; align-items: baseline; gap: 4px; }
  .entry-stat-num {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .entry-stat-key {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .entry-stat.cal .entry-stat-num { color: var(--blue-bright); }
  .entry-stat.pro .entry-stat-num { color: var(--accent-coral); }
  .entry-stat.fib .entry-stat-num { color: var(--accent-mint); }
  .entry-del {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
    transition: all 0.2s;
    line-height: 1;
  }
  .entry-del:hover, .entry-del:active { color: var(--accent-coral); background: rgba(255,107,138,0.1); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-faint);
  }
  .empty-icon {
    font-family: 'Fraunces', serif;
    font-size: 48px;
    font-style: italic;
    color: var(--blue-bright);
    opacity: 0.4;
    margin-bottom: 8px;
    display: block;
  }
  .empty-text {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--text-dim);
  }
  .empty-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-top: 8px;
  }

  /* reset button */
  .reset-row { display: flex; justify-content: center; margin-top: 8px; }
  .reset-btn {
    background: none;
    border: 1px solid rgba(76,201,255,0.15);
    color: var(--text-faint);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover, .reset-btn:active {
    border-color: var(--accent-coral);
    color: var(--accent-coral);
  }

  /* fixed bottom add bar */
  .composer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 18px 24px;
    background: linear-gradient(180deg, transparent 0%, rgba(5,11,31,0.85) 30%, rgba(5,11,31,0.98) 100%);
    backdrop-filter: blur(20px);
    z-index: 10;
  }
  .composer-inner {
    max-width: 480px;
    margin: 0 auto;
    background: linear-gradient(145deg, rgba(26,47,107,0.7), rgba(10,21,50,0.5));
    border: 1px solid rgba(76,201,255,0.3);
    border-radius: 28px;
    padding: 14px;
    box-shadow: 0 20px 50px -10px rgba(0,0,0,0.6), 0 0 40px -10px rgba(76,201,255,0.3);
    backdrop-filter: blur(20px);
  }
  .inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .input-cell {
    background: rgba(5,11,31,0.5);
    border: 1px solid rgba(76,201,255,0.15);
    border-radius: 16px;
    padding: 10px 12px;
    transition: all 0.2s;
  }
  .input-cell:focus-within {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(76,201,255,0.15);
  }
  .input-cell label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 4px;
  }
  .input-cell input {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    -moz-appearance: textfield;
  }
  .input-cell input::-webkit-outer-spin-button,
  .input-cell input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .input-cell input::placeholder { color: var(--text-faint); opacity: 0.5; }

  .input-cell.cal label { color: var(--blue-bright); }
  .input-cell.pro label { color: var(--accent-coral); }
  .input-cell.fib label { color: var(--accent-mint); }

  .add-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--blue-bright), var(--cyan-glow));
    color: var(--navy-deepest);
    border: none;
    border-radius: 16px;
    padding: 14px;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(76,201,255,0.4);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .add-btn:active { transform: scale(0.98); }
  .add-btn:disabled {
    background: rgba(76,201,255,0.15);
    color: var(--text-faint);
    box-shadow: none;
    cursor: not-allowed;
  }
  .add-btn-arrow { font-size: 18px; }

  /* pulse on number change */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); color: var(--cyan-glow); }
    100% { transform: scale(1); }
  }
  .pulse { animation: pulse 0.5s ease; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <header>
    <div>
      <div class="greeting">today's intake</div>
      <div class="date" id="date">Apr <em>25</em></div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <!-- Calories hero -->
  <div class="hero">
    <div class="hero-label">calories</div>
    <div class="hero-row">
      <div class="ring-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4cc9ff"/>
              <stop offset="100%" stop-color="#00e5ff"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="65" cy="65" r="56"/>
          <circle id="ringFill" class="ring-fill" cx="65" cy="65" r="56" stroke-dasharray="0 351.86"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="calNum">0</div>
          <div class="ring-unit">kcal</div>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-key">goal</span>
          <span class="hero-stat-val" id="calGoal">2400</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-key">remaining</span>
          <span class="hero-stat-val" id="calRem">2400<em>kcal</em></span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-key">progress</span>
          <span class="hero-stat-val" id="calPct">0<em>%</em></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Macros -->
  <div class="macros">
    <div class="macro protein">
      <div class="macro-label"><span class="macro-dot"></span>protein</div>
      <div class="macro-num"><span id="proNum">0</span><span class="macro-num-unit">g</span></div>
      <div class="macro-bar"><div class="macro-bar-fill" id="proBar" style="width: 0%"></div></div>
      <div class="macro-target">of <span id="proGoal">180</span>g target</div>
    </div>
    <div class="macro fiber">
      <div class="macro-label"><span class="macro-dot"></span>fiber</div>
      <div class="macro-num"><span id="fibNum">0</span><span class="macro-num-unit">g</span></div>
      <div class="macro-bar"><div class="macro-bar-fill" id="fibBar" style="width: 0%"></div></div>
      <div class="macro-target">of <span id="fibGoal">35</span>g target</div>
    </div>
  </div>

  <!-- Log -->
  <div class="section-head">
    <div class="section-title"><em>the</em> log</div>
    <div class="section-count" id="logCount">0 entries</div>
  </div>

  <div class="log" id="log"></div>

  <div class="reset-row" id="resetRow" style="display:none">
    <button class="reset-btn" id="resetBtn">reset day</button>
  </div>
</div>

<!-- Composer -->
<div class="composer">
  <div class="composer-inner">
    <div class="inputs">
      <div class="input-cell cal">
        <label for="inCal">calories</label>
        <input type="number" id="inCal" inputmode="decimal" placeholder="0" min="0" />
      </div>
      <div class="input-cell pro">
        <label for="inPro">protein</label>
        <input type="number" id="inPro" inputmode="decimal" placeholder="0" min="0" />
      </div>
      <div class="input-cell fib">
        <label for="inFib">fiber</label>
        <input type="number" id="inFib" inputmode="decimal" placeholder="0" min="0" />
      </div>
    </div>
    <button class="add-btn" id="addBtn" disabled>
      <span>add to today</span>
      <span class="add-btn-arrow">→</span>
    </button>
  </div>
</div>

<script>
  const GOALS = { cal: 2400, pro: 180, fib: 35 };

  const $ = id => document.getElementById(id);
  const log = [];

  // Date display
  function setDate() {
    const d = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    $('date').innerHTML = `${months[d.getMonth()]} <em>${d.getDate()}</em>`;
  }

  function setClock() {
    const d = new Date();
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    $('clock').textContent = `${h}:${m}`;
  }

  setDate();
  setClock();
  setInterval(setClock, 30000);

  // Goals
  $('calGoal').textContent = GOALS.cal;
  $('proGoal').textContent = GOALS.pro;
  $('fibGoal').textContent = GOALS.fib;

  function totals() {
    return log.reduce((acc, e) => ({
      cal: acc.cal + e.cal,
      pro: acc.pro + e.pro,
      fib: acc.fib + e.fib
    }), { cal: 0, pro: 0, fib: 0 });
  }

  function pulseEl(el) {
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }

  function render(animate = true) {
    const t = totals();
    const round = n => Math.round(n * 10) / 10;

    // Calories ring
    const calPct = Math.min(t.cal / GOALS.cal, 1);
    const circ = 2 * Math.PI * 56;
    $('ringFill').setAttribute('stroke-dasharray', `${circ * calPct} ${circ}`);
    $('calNum').textContent = Math.round(t.cal);
    $('calRem').innerHTML = `${Math.max(GOALS.cal - Math.round(t.cal), 0)}<em>kcal</em>`;
    $('calPct').innerHTML = `${Math.round((t.cal / GOALS.cal) * 100)}<em>%</em>`;

    // Macros
    $('proNum').textContent = round(t.pro);
    $('fibNum').textContent = round(t.fib);
    $('proBar').style.width = Math.min(t.pro / GOALS.pro, 1) * 100 + '%';
    $('fibBar').style.width = Math.min(t.fib / GOALS.fib, 1) * 100 + '%';

    if (animate) {
      pulseEl($('calNum'));
      pulseEl($('proNum'));
      pulseEl($('fibNum'));
    }

    // Log
    const logEl = $('log');
    if (log.length === 0) {
      logEl.innerHTML = `
        <div class="empty">
          <span class="empty-icon">∅</span>
          <div class="empty-text">nothing logged yet</div>
          <div class="empty-sub">add your first entry below</div>
        </div>
      `;
      $('resetRow').style.display = 'none';
    } else {
      logEl.innerHTML = log.map((e, i) => `
        <div class="entry" style="animation-delay: ${Math.min(i * 0.04, 0.3)}s">
          <span class="entry-time">${e.time}</span>
          <div class="entry-stats">
            ${e.cal ? `<div class="entry-stat cal"><span class="entry-stat-num">${round(e.cal)}</span><span class="entry-stat-key">cal</span></div>` : ''}
            ${e.pro ? `<div class="entry-stat pro"><span class="entry-stat-num">${round(e.pro)}</span><span class="entry-stat-key">p</span></div>` : ''}
            ${e.fib ? `<div class="entry-stat fib"><span class="entry-stat-num">${round(e.fib)}</span><span class="entry-stat-key">f</span></div>` : ''}
          </div>
          <button class="entry-del" data-id="${e.id}" aria-label="delete">×</button>
        </div>
      `).join('');
      $('resetRow').style.display = 'flex';
    }

    $('logCount').textContent = `${log.length} ${log.length === 1 ? 'entry' : 'entries'}`;

    // Wire deletes
    document.querySelectorAll('.entry-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = +btn.dataset.id;
        const idx = log.findIndex(e => e.id === id);
        if (idx > -1) {
          log.splice(idx, 1);
          save();
          render();
        }
      });
    });
  }

  // Inputs
  const inCal = $('inCal'), inPro = $('inPro'), inFib = $('inFib');
  const addBtn = $('addBtn');

  function checkInputs() {
    const c = parseFloat(inCal.value) || 0;
    const p = parseFloat(inPro.value) || 0;
    const f = parseFloat(inFib.value) || 0;
    addBtn.disabled = (c <= 0 && p <= 0 && f <= 0);
  }

  [inCal, inPro, inFib].forEach(el => {
    el.addEventListener('input', checkInputs);
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !addBtn.disabled) addEntry();
    });
  });

  function addEntry() {
    const cal = parseFloat(inCal.value) || 0;
    const pro = parseFloat(inPro.value) || 0;
    const fib = parseFloat(inFib.value) || 0;
    if (cal <= 0 && pro <= 0 && fib <= 0) return;

    const d = new Date();
    const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    log.unshift({ id: Date.now(), cal, pro, fib, time });

    inCal.value = inPro.value = inFib.value = '';
    checkInputs();
    save();
    render();
    inCal.focus();
  }

  addBtn.addEventListener('click', addEntry);

  // Reset
  $('resetBtn').addEventListener('click', () => {
    if (confirm('Clear all entries for today?')) {
      log.length = 0;
      save();
      render(false);
    }
  });

  // Persistence — daily reset
  function todayKey() {
    const d = new Date();
    return `nutri-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function save() {
    try {
      localStorage.setItem('nutri-log', JSON.stringify({ date: todayKey(), entries: log }));
    } catch(e) {}
  }

  function load() {
    try {
      const data = JSON.parse(localStorage.getItem('nutri-log'));
      if (data && data.date === todayKey() && Array.isArray(data.entries)) {
        log.push(...data.entries);
      }
    } catch(e) {}
  }

  load();
  render(false);
</script>

</body>
</html>
